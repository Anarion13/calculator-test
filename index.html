<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Calculator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="calculator" aria-label="Calculator" data-calculator>
        <div class="display" aria-live="polite">
          <p class="display__history" data-history>0</p>
          <output class="display__value" data-display>0</output>
        </div>

        <div class="mode-switch">
          <span class="mode-switch__label">Basic</span>
          <button type="button" class="mode-switch__toggle" data-action="toggle-mode" aria-label="Toggle scientific mode" aria-pressed="false">
            <span class="mode-switch__thumb"></span>
          </button>
          <span class="mode-switch__label">Scientific</span>
        </div>

        <div class="scientific-keys" role="group" aria-label="Scientific function keys" data-scientific-keys hidden>
          <button type="button" class="key key--scientific" data-action="sin">sin</button>
          <button type="button" class="key key--scientific" data-action="cos">cos</button>
          <button type="button" class="key key--scientific" data-action="tan">tan</button>
          <button type="button" class="key key--scientific" data-action="ln">ln</button>
          <button type="button" class="key key--scientific" data-action="log">log</button>
          <button type="button" class="key key--scientific" data-action="sqrt">&radic;</button>
          <button type="button" class="key key--scientific" data-action="square">x&sup2;</button>
          <button type="button" class="key key--scientific" data-action="power">x<sup>y</sup></button>
          <button type="button" class="key key--scientific" data-action="factorial">n!</button>
          <button type="button" class="key key--scientific" data-action="reciprocal">1/x</button>
          <button type="button" class="key key--scientific" data-action="constant" data-value="pi">&pi;</button>
          <button type="button" class="key key--scientific" data-action="constant" data-value="e">e</button>
        </div>

        <div class="keys" role="group" aria-label="Calculator keys">
          <button type="button" class="key key--function" data-action="clear">AC</button>
          <button type="button" class="key key--function" data-action="toggle-sign">+/-</button>
          <button type="button" class="key key--function" data-action="percent">%</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="/">/</button>

          <button type="button" class="key" data-action="digit" data-value="7">7</button>
          <button type="button" class="key" data-action="digit" data-value="8">8</button>
          <button type="button" class="key" data-action="digit" data-value="9">9</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="*">x</button>

          <button type="button" class="key" data-action="digit" data-value="4">4</button>
          <button type="button" class="key" data-action="digit" data-value="5">5</button>
          <button type="button" class="key" data-action="digit" data-value="6">6</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="-">-</button>

          <button type="button" class="key" data-action="digit" data-value="1">1</button>
          <button type="button" class="key" data-action="digit" data-value="2">2</button>
          <button type="button" class="key" data-action="digit" data-value="3">3</button>
          <button type="button" class="key key--operator" data-action="operator" data-value="+">+</button>

          <button type="button" class="key key--wide" data-action="digit" data-value="0">0</button>
          <button type="button" class="key" data-action="decimal">.</button>
          <button type="button" class="key key--operator" data-action="equals">=</button>
        </div>

        <p class="hint">Supports mouse clicks and keyboard input.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
